apiVersion: v1
kind: Namespace
metadata:
  name: production

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-fit-coach
  namespace: production
  labels:
    app: ai-fit-coach
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-fit-coach
  template:
    metadata:
      labels:
        app: ai-fit-coach
    spec:
      containers:
      - name: ai-fit-coach
        image: suryathejas/ai-fit-coach:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000

        # Environment Variables (optional)
        env:
        - name: NODE_ENV
          value: "production"

        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"

        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 20
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5

---

apiVersion: v1
kind: Service
metadata:
  name: ai-fit-coach-service
  namespace: production
spec:
  type: NodePort   # Works locally (Minikube / Docker Desktop)
  selector:
    app: ai-fit-coach
  ports:
  - port: 80
    targetPort: 3000
    nodePort: 30007   # You can change this (30000–32767)

---

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-fit-coach-hpa
  namespace: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-fit-coach
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70